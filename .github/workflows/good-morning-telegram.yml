name: Good Morning Telegram Message

on:
  schedule:
    # 7:00 AM IST (UTC+5:30) = 1:30 AM UTC
    - cron: "30 1 * * *"
  workflow_dispatch: {}

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Send good morning message
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Good morning! ☀️"
